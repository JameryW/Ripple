# Backtest seed fixtures for Ripple prediction quality calibration.
#
# These cases are SYNTHETIC but modeled on realistic social-media prediction
# scenarios.  They are NOT real user data.  Each case pairs a prediction-time
# input with a known ground-truth outcome so that the backtest runner can
# measure error without calling an LLM.
#
# Case categories:
#   optimistic  - LLM over-predicted by 3-5x vs reality
#   conservative - LLM under-predicted vs reality
#   calibrated  - prediction within ~30% of reality
#
# Format follows BacktestCase schema v1.0 (ripple/backtest/schema.py).

- case_id: "opt-xhs-video-001"
  schema_version: "1.0"
  skill_id: "social-media"
  tags: ["optimistic", "xiaohongshu", "video"]
  platform: "xiaohongshu"
  channel: "generic"
  vertical: "beauty"
  time_window: "48h"
  content_type: "video"
  simulation_input:
    event:
      title: "XHS beauty vlogger seasonal makeup tutorial"
      platform: "xiaohongshu"
      content_type: "video"
      follower_count: 15000
    simulation_horizon: "48h"
  ground_truth:
    impressions: 8500
    engagement: 680
    reach: 6200
    likes: 450
    comments: 120
    shares: 45
    virality_probability: 0.05
    breakout_probability: 0.02
    long_tail_probability: 0.15
    conversion: 30

